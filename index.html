<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="logos">
    <div class="logo-box">
        <img src="designs/logo1.png" alt="Mickey Mouse logo">
    </div>
    <div class="logo-box">
        <img src="designs/logo2.png" alt="BBC logo">
    </div>
</section>

<button id="openModal">Открыть модальное окно</button>

<div class="modal hidden" id="modal">
    <div class="modal-content">
        <button class="modal-close" id="closeModal">&#x2715;</button>
        <h3>Загрузка</h3>
        <div class="progress-container">
            <div class="progress-bar"></div>
            <div class="progress-text">Loading...</div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
